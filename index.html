<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Titan Biosciences</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
      background:
        radial-gradient(circle at top left, rgba(30, 64, 175, 0.10), transparent 34%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.10), transparent 32%),
        #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 780px;
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 28px;
      padding: 56px 48px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(10px);
    }

    .logo {
      max-width: 360px;
      width: 80%;
      height: auto;
      margin-bottom: 34px;
    }

    .tagline {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #0f172a;
    }

    .divider {
      width: 72px;
      height: 1px;
      background: #cbd5e1;
      margin: 36px auto;
    }

    .contact {
      margin: 0;
      font-size: 16px;
      color: #64748b;
    }

    .contact a {
      color: #0f172a;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(15, 23, 42, 0.25);
      padding-bottom: 2px;
    }

    .contact a:hover {
      border-bottom-color: #0f172a;
    }

    @media (max-width: 560px) {
      body {
        padding: 20px;
      }

      .card {
        padding: 40px 24px;
        border-radius: 22px;
      }

      .logo {
        max-width: 280px;
        margin-bottom: 28px;
      }

      .divider {
        margin: 30px auto;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="logo.png" alt="Titan Biosciences logo" />

    <h1 class="tagline">
      Curing heart disease, one gene at a time
    </h1>

    <div class="divider"></div>

    <p class="contact">
      Contact: <a href="mailto:david@titanbiosci.com">david@titanbiosci.com</a>
    </p>
  </main>
</body>
</html>
