<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Titan Biosciences</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #113141;
      background: #fffaf7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 780px;
      background: #fffaf7;
      border: 1px solid rgba(17, 49, 65, 0.12);
      border-radius: 28px;
      padding: 56px 48px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(17, 49, 65, 0.10);
    }

    .logo {
      max-width: 380px;
      width: 82%;
      height: auto;
      margin-bottom: 34px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .tagline {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.22;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #113141;
    }

    .mobile-break {
      display: inline;
    }

    .divider {
      width: 72px;
      height: 1px;
      background: rgba(17, 49, 65, 0.22);
      margin: 36px auto;
    }

    .contact {
      margin: 0;
      font-size: 16px;
      color: rgba(17, 49, 65, 0.72);
    }

    .contact a {
      color: #113141;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(17, 49, 65, 0.28);
      padding-bottom: 2px;
    }

    .contact a:hover {
      border-bottom-color: #113141;
    }

    @media (max-width: 560px) {
      body {
        padding: 20px;
      }

      .card {
        padding: 40px 24px;
        border-radius: 22px;
      }

      .logo {
        max-width: 300px;
        margin-bottom: 28px;
      }

      .tagline {
        font-size: 28px;
        line-height: 1.18;
        max-width: 420px;
        margin-left: auto;
        margin-right: auto;
      }

      .mobile-break {
        display: block;
      }

      .divider {
        margin: 30px auto;
      }
    }

    @media (max-width: 390px) {
      .tagline {
        font-size: 26px;
      }

      .contact {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="logo.png" alt="Titan Biosciences logo" />

    <h1 class="tagline">
      Curing heart disease,<span class="mobile-break"> one gene at a time</span>
    </h1>

    <div class="divider"></div>

    <p class="contact">
      Contact: <a href="mailto:david@titanbiosci.com">david@titanbiosci.com</a>
    </p>
  </main>
</body>
</html>
